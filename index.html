<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero Spoiler</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="Partidos disponibles">
        <div class="brand-row">
          <div>
            <p class="eyebrow">by @emangare</p>
            <h1>Zero Spoiler</h1>
            <p class="subtitle">Partidos de las últimas 48hs</p>
          </div>
          <button id="refreshButton" class="icon-button" type="button" title="Actualizar lista" aria-label="Actualizar lista" disabled>
            ↻
          </button>
        </div>

        <div class="status-panel">
          <span id="statusDot" class="status-dot"></span>
          <p id="statusText">Buscando partidos de las últimas 48 horas...</p>
        </div>

        <div id="matchList" class="match-list" aria-live="polite"></div>
      </section>

      <section class="player-stage" aria-label="Reproductor seguro">
        <div class="safe-browser">
          <div id="emptyState" class="empty-state">
            <p>Seleccioná un partido de la lista. La reproducción empieza automáticamente en modo seguro.</p>
          </div>
          <div id="playerFrame" class="player-frame is-hidden">
            <iframe
              id="youtubePlayer"
              title="Reproductor sin spoilers visibles"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
            <div id="playerCover" class="player-cover">
              <p>Video listo en modo seguro</p>
            </div>
            <div class="mask mask-top" aria-hidden="true"></div>
            <div class="mask mask-bottom" aria-hidden="true"></div>
            <div class="mask mask-left" aria-hidden="true"></div>
            <div class="mask mask-right" aria-hidden="true"></div>
          </div>
        </div>

        <div class="controls-bar">
          <div id="currentSelection" class="current-selection">Sin partido seleccionado</div>
          <button id="rewindButton" class="secondary-button" type="button" disabled>−10s</button>
          <button id="playPauseButton" class="secondary-button" type="button" disabled>Reiniciar</button>
          <button id="audioButton" class="secondary-button" type="button" disabled>Audio: OFF</button>
          <button id="togglePanelButton" class="secondary-button" type="button" disabled>Ampliar</button>
        </div>
      </section>
    </main>

    <footer class="app-footer" aria-label="Información del proyecto">
      <a href="https://github.com/emangareATORT/you2beMundial" target="_blank" rel="noreferrer">GitHub</a>
      <span>v1.2</span>
    </footer>

    <script src="/app.js" defer></script>
  </body>
</html>
